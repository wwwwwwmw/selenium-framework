name: Full Selenium CI Pipeline
on:
  push:
    branches: [ main ]
  workflow_dispatch: # Cho phép chạy thủ công từ nút trên GitHub

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        [cite_start]browser: [chrome, firefox] # Chạy song song 2 trình duyệt [cite: 432, 1099]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Selenium Tests
        run: mvn clean test -Dbrowser=${{ matrix.browser }} -DsuiteXmlFile=testng-smoke.xml
        env:
          APP_USERNAME: ${{ secrets.SAUCEDEMO_USERNAME }}
          APP_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}

      - name: Upload Allure Results
        [cite_start]if: always() # Luôn lưu kết quả kể cả khi test fail [cite: 446, 1121]
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: target/allure-results/

  publish-report:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Results
        uses: actions/download-artifact@v4
        with:
          path: allure-results

      - name: Generate & Publish Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report